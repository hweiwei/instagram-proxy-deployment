# ============================================
# Instagram Proxy 环境变量配置
# 请根据你的服务器实际情况修改以下配置
# ============================================

# ============================================
# 服务器基础配置
# ============================================

# 服务器公网 IP 地址
SERVER_IP="YOUR_SERVER_IP"

# 服务器 SSH 端口
SSH_PORT=22

# 服务器主机名
SERVER_HOSTNAME="instagram-proxy"

# 系统时区
TIMEZONE="Asia/Shanghai"

# ============================================
# 域名配置（可选，用于 Cloudflare CDN）
# ============================================

# 是否启用域名（启用后需要填写下方配置）
USE_DOMAIN=false

# 你的域名
DOMAIN="proxy.yourdomain.com"

# Cloudflare API Token（如使用 Cloudflare）
CF_API_TOKEN="your_cloudflare_api_token"

# Cloudflare Zone ID
CF_ZONE_ID="your_zone_id"

# ============================================
# Xray 代理配置
# ============================================

# Xray 安装版本
XRAY_VERSION="v25.4.20"

# 代理服务端口
PROXY_PORT=443

# WebSocket 路径（建议修改为随机字符串）
WS_PATH="/instagram-ws"

# VLESS 端口
VLESS_PORT=10086

# Trojan 端口
TROJAN_PORT=10087

# ============================================
# 代理账号配置
# ============================================

# 账号数量（根据需求调整）
ACCOUNT_COUNT=3

# 账号1 - 用于手机设备
USER_1_UUID="auto-generated"
USER_1_EMAIL="mobile@proxy.local"
USER_1_ALERT_LEVEL="normal"

# 账号2 - 用于电脑设备
USER_2_UUID="auto-generated"
USER_2_EMAIL="desktop@proxy.local"
USER_2_ALERT_LEVEL="normal"

# 账号3 - 备用账号
USER_3_UUID="auto-generated"
USER_3_EMAIL="backup@proxy.local"
USER_3_ALERT_LEVEL="low"

# ============================================
# Instagram 特定配置
# ============================================

# Instagram API 请求伪装
IG_USER_AGENT="Mozilla/5.0 (iPhone; CPU iPhone OS 17_4 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.4 Mobile/15E148 Safari/604.1"

# 请求间隔（秒）- 防风控随机延迟
MIN_REQUEST_INTERVAL=30
MAX_REQUEST_INTERVAL=120

# 最大并发连接数
MAX_CONNECTIONS=5

# TLS 指纹类型 (chrome, firefox, safari, ios)
TLS_FINGERPRINT="chrome"

# ============================================
# Nginx 配置
# ============================================

# Nginx 监听端口
NGINX_HTTP_PORT=80
NGINX_HTTPS_PORT=443

# 是否自动申请 SSL 证书
AUTO_SSL=true

# SSL 证书邮箱
SSL_EMAIL="ssl@proxy.local"

# ============================================
# 安全配置
# ============================================

# 防火墙允许的端口（用空格分隔）
ALLOWED_PORTS="22 80 443 10086 10087 33001"

# 是否启用fail2ban防暴力破解
ENABLE_FAIL2BAN=true

# SSH 登录失败最大次数
MAX_AUTH_RETRIES=5

# 是否启用流量限制
ENABLE_RATE_LIMIT=true

# 每个IP最大连接数
MAX_IP_CONNECTIONS=10

# ============================================
# 日志与监控配置
# ============================================

# 日志级别 (debug, info, warn, error)
LOG_LEVEL="info"

# 日志保留天数
LOG_RETENTION_DAYS=7

# 是否启用Prometheus监控
ENABLE_MONITORING=true

# ============================================
# Docker 配置
# ============================================

# Docker 版本
DOCKER_VERSION="24.0"

# 是否使用 Docker 部署
USE_DOCKER=true

# ============================================
# 备份配置
# ============================================

# 备份目录
BACKUP_DIR="/opt/proxy-backup"

# 是否启用自动备份
ENABLE_AUTO_BACKUP=true

# 备份频率 (daily, weekly, monthly)
BACKUP_FREQUENCY="daily"

# 备份保留份数
BACKUP_RETENTION=7

# ============================================
# 高级配置（一般不需要修改）
# ============================================

# Xray 配置目录
XRAY_CONFIG_DIR="/etc/xray"

# Xray 日志目录
XRAY_LOG_DIR="/var/log/xray"

# BBR 加速
ENABLE_BBR=true

# 内核优化
ENABLE_KERNEL_TUNING=true

# IP Tables FORWARD 转发
ENABLE_IP_FORWARD=true
