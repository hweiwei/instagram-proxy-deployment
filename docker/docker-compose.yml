---
# Instagram Proxy Docker Compose 配置
# 用于容器化部署 Xray + Nginx 代理服务

version: '3.8'

services:
  # ==========================================
  # Xray Core 代理服务
  # ==========================================
  xray:
    image: teddysun/xray:latest
    container_name: instagram-xray
    restart: unless-stopped
    privileged: true
    ports:
      - "10086:10086"   # VLESS
      - "10087:10087"   # Trojan
      - "10088:10088"   # VMess TCP
      - "10089:10089"   # VMess WebSocket
      - "10085:10085"   # API
    volumes:
      - ./config/xray-config.json:/etc/xray/config.json:ro
      - ./logs/xray:/var/log/xray
      - ./certs:/etc/ssl/certs:ro
      - ./certs:/etc/letsencrypt:ro
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
    sysctls:
      - net.ipv4.ip_forward=1
      - net.core.default_qdisc=fq
      - net.ipv4.tcp_congestion_control=bbr
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10085/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Nginx 反向代理
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: instagram-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx-limit.conf:/etc/nginx/conf.d/nginx-limit.conf:ro
      - ./config/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - ./logs/nginx:/var/log/nginx
      - ./certs:/etc/ssl/certs:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      - xray
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # Let's Encrypt SSL 证书申请
  # ==========================================
  certbot:
    image: certbot/certbot:latest
    container_name: instagram-certbot
    restart: unless-stopped
    volumes:
      - ./certs:/etc/letsencrypt
      - ./html:/usr/share/nginx/html:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; nginx -s reload 2>/dev/null || true; done;'"
    command: certonly --webroot -w /usr/share/nginx/html --agree-tos --renew-by-default
    networks:
      - proxy-network
    depends_on:
      - nginx

  # ==========================================
  # Fail2ban 防暴力破解
  # ==========================================
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: instagram-fail2ban
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/fail2ban:/data
      - /var/log:/var/log:ro
      - ./logs/fail2ban:/var/log/fail2ban
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
      - FAIL2BAN_JAIL_DEFAULT_BANTIME=3600
      - FAIL2BAN_JAIL_DEFAULT_FINDTIME=600
      - FAIL2BAN_JAIL_DEFAULT_MAXRETRY=5
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ==========================================
  # Prometheus 监控
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: instagram-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - proxy-network

  # ==========================================
  # Grafana 可视化监控
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: instagram-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana.ini:/etc/grafana/grafana.ini:ro
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - proxy-network
    depends_on:
      - prometheus

  # ==========================================
  # Uptime Kuma 监控
  # ==========================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: instagram-uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data/uptime-kuma:/app/data
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
    networks:
      - proxy-network

# ==========================================
# 网络配置
# ==========================================
networks:
  proxy-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ==========================================
# 卷配置
# ==========================================
volumes:
  xray-logs:
  nginx-logs:
  certs:
  prometheus-data:
  grafana-data:
  uptime-kuma-data:
  fail2ban-data:
